dataset_dir: ./data
image_extensions: [".jpg", ".png", ".tif"]
pagexml_extension: .xml
prompt: >
  Transcribe this historical Swedish handwritten page as accurately as possible.
  Keep spelling and line breaks when possible. Return only plain transcription text.
output_csv: ./outputs/results.csv
models:
  - name: gpt-4.1-mini
    provider: openai_compatible
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    max_tokens: 2048
    temperature: 0

  - name: claude-sonnet
    provider: anthropic
    model: claude-3-5-sonnet-latest
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1
    max_tokens: 2048
    temperature: 0

  - name: gemini-2.0-flash
    provider: gemini
    model: gemini-2.0-flash
    api_key_env: GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta
    max_tokens: 2048
    temperature: 0

  - name: deepseek-vl2
    provider: deepseek
    model: deepseek-vl2
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    max_tokens: 2048
    temperature: 0

  # Example for open-source/self-hosted VLM exposing OpenAI-compatible endpoint
  - name: local-qwen2.5-vl
    provider: openai_compatible
    model: Qwen/Qwen2.5-VL-7B-Instruct
    api_key_env: LOCAL_VLM_API_KEY
    base_url: http://localhost:8000/v1
    max_tokens: 2048
    temperature: 0
