dataset_dir: /home/sneriko/projects/vlm_eval/data/one_image_test
image_extensions: [".jpg", ".png", ".tif"]
pagexml_extension: .xml
prompt: >
  Transcribe this historical Swedish handwritten page as accurately as possible.
  Keep spelling and line breaks when possible. Return only plain transcription text.
output_csv: ./output/results.csv
models:
  - name: gemini-3-flash-preview
    provider: gemini
    model: gemini-3-flash-preview
    api_key_env: GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta
    max_tokens: 65536
    temperature: 0 